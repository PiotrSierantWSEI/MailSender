<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailSender</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: rgba(255, 252, 246, 0.92);
            --panel-border: rgba(84, 58, 20, 0.15);
            --text: #1f1a14;
            --muted: #665846;
            --accent: #b04a1f;
            --accent-dark: #7f3113;
            --ok-bg: rgba(32, 123, 73, 0.12);
            --ok-text: #205b39;
            --error-bg: rgba(176, 74, 31, 0.12);
            --error-text: #8f3414;
            --shadow: 0 24px 60px rgba(59, 38, 12, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(176, 74, 31, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(108, 141, 99, 0.18), transparent 28%),
                linear-gradient(135deg, #efe3cf 0%, #f7f2eb 46%, #efe8dc 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 720px);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .hero {
            padding: 32px 32px 20px;
            border-bottom: 1px solid rgba(84, 58, 20, 0.1);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.08)),
                repeating-linear-gradient(
                    -45deg,
                    transparent 0,
                    transparent 10px,
                    rgba(176, 74, 31, 0.04) 10px,
                    rgba(176, 74, 31, 0.04) 20px
                );
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 12px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 5vw, 52px);
            line-height: 0.95;
            font-weight: 700;
        }

        form {
            padding: 28px 32px 32px;
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid rgba(84, 58, 20, 0.18);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--text);
            padding: 14px 16px;
            font: inherit;
            transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(176, 74, 31, 0.7);
            box-shadow: 0 0 0 4px rgba(176, 74, 31, 0.12);
            transform: translateY(-1px);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            padding-top: 4px;
        }

        button {
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fffaf5;
            padding: 14px 24px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 14px 32px rgba(176, 74, 31, 0.28);
            transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
        }

        button:hover:not(:disabled),
        button:focus-visible:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(176, 74, 31, 0.34);
        }

        button:disabled {
            opacity: 0.72;
            cursor: wait;
        }

        .status {
            display: none;
            margin: 0 32px 32px;
            padding: 14px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
        }

        .status.visible {
            display: block;
        }

        .status.success {
            background: var(--ok-bg);
            color: var(--ok-text);
        }

        .status.error {
            background: var(--error-bg);
            color: var(--error-text);
        }

        @media (max-width: 640px) {
            .hero,
            form {
                padding-left: 20px;
                padding-right: 20px;
            }

            .status {
                margin-left: 20px;
                margin-right: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <form id="mail-form">
            <div class="field">
                <label for="to">Odbiorca</label>
                <input id="to" name="to" type="email" autocomplete="email" placeholder="np. piotr.sierant@microsoft.wsei.edu.pl" required>
            </div>

            <div class="field">
                <label for="subject">Temat</label>
                <input id="subject" name="subject" type="text" placeholder="Temat wiadomości" required>
            </div>

            <div class="field">
                <label for="body">Treść</label>
                <textarea id="body" name="body" placeholder="Wpisz treść wiadomości" required></textarea>
            </div>

            <div class="field">
                <label for="token">Token</label>
                <input id="token" name="token" type="text" placeholder="Wklej token" required>
            </div>

            <div class="actions">
                <button id="submit-button" type="submit">Wyslij</button>
            </div>
        </form>

        <div id="status" class="status" role="status" aria-live="polite"></div>
    </main>

    <script>
        const form = document.getElementById("mail-form");
        const submitButton = document.getElementById("submit-button");
        const statusBox = document.getElementById("status");

        const setStatus = (message, type) => {
            statusBox.textContent = message;
            statusBox.className = "status visible " + type;
        };

        const clearStatus = () => {
            statusBox.textContent = "";
            statusBox.className = "status";
        };

        const normalizeToken = (value) => value.replace(/^Bearer\s+/i, "").trim();

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            clearStatus();

            const formData = new FormData(form);
            const to = String(formData.get("to") || "").trim();
            const subject = String(formData.get("subject") || "").trim();
            const body = String(formData.get("body") || "").trim();
            const token = normalizeToken(String(formData.get("token") || ""));

            if (!to || !subject || !body || !token) {
                setStatus("Uzupelnij wszystkie pola formularza.", "error");
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = "Wysylanie...";

            try {
                const response = await fetch("http://localhost:5176/mail/send", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ to, subject, body })
                });

                if (!response.ok) {
                    let details = "";
                    try {
                        details = await response.text();
                    } catch {
                        details = "";
                    }

                    const suffix = details ? " Szczegoly: " + details : "";
                    throw new Error("Serwer zwrocil blad " + response.status + "." + suffix);
                }

                form.reset();
                setStatus("Wiadomosc zostala wyslana poprawnie.", "success");
            } catch (error) {
                const message = error instanceof Error
                    ? error.message
                    : "Nie udalo sie wyslac wiadomosci.";
                setStatus(message, "error");
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = "Wyslij";
            }
        });
    </script>
</body>
</html>
