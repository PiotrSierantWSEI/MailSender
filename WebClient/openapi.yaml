openapi: 3.0.1
info:
  title: MailSender
  version: "1.0"
paths:
  /auth/token:
    post:
      tags:
        - MailSender
      operationId: IssueToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueTokenRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /client-app/register:
    post:
      tags:
        - MailSender
      operationId: RegisterClientApp
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterClientAppRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /mail/send:
    post:
      tags:
        - MailSender
      operationId: SendMessage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailSendRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
components:
  schemas:
    IssueTokenRequest:
      type: object
      properties:
        username:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
      additionalProperties: false
    MailSendRequest:
      type: object
      properties:
        to:
          type: string
          nullable: true
        subject:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
      additionalProperties: false
    RegisterClientAppRequest:
      type: object
      properties:
        appId:
          type: string
          nullable: true
        appName:
          type: string
          nullable: true
        pass:
          type: string
          nullable: true
      additionalProperties: false
    Void:
      type: object
      additionalProperties: false
  securitySchemes:
    Bearer:
      type: http
      description: "Wklej token w formacie: Bearer {token}"
      scheme: Bearer
      bearerFormat: JWT
security:
  - Bearer: []
